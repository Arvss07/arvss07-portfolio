<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOSSIER — Subject File</title>
    <link rel="icon" type="image/png" href="images/logo.png" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&family=Playfair+Display:wght@600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Devicon -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.15.1/devicon.min.css"
    />

    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas id="bg-canvas" aria-hidden="true"></canvas>

    <div id="boot">
      <div class="boot-inner">
        <h1 class="boot-title">Loading please wait...</h1>
        <div class="boot-logs">
          <div class="boot-line" data-boot-line="0"></div>
          <div class="boot-line" data-boot-line="1"></div>
          <div class="boot-line" data-boot-line="2"></div>
          <div class="boot-line" data-boot-line="3"></div>
          <div class="boot-line" data-boot-line="4"></div>
        </div>
        <div class="boot-progress-wrap">
          <div class="boot-progress-bar"></div>
        </div>
        <p class="boot-status">Initializing subject file...</p>
      </div>
    </div>

    <div id="app" style="opacity: 0">
      <button type="button" class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
        <i class="fas fa-bars"></i>
      </button>
      <aside id="sidebar">
        <div class="sidebar-header">
          <img src="images/logo.png" alt="" class="sidebar-logo" />
          <h2 class="sidebar-subject-name"></h2>
          <p class="sidebar-brand"></p>
          <div class="sidebar-status">
            <span class="status-dot"></span>
            <span class="status-label">ONLINE</span>
          </div>
          <button type="button" class="dark-light-toggle" id="darkLightToggle">
            <i class="fas fa-moon"></i> CLASSIFIED
          </button>
        </div>
        <nav class="sidebar-nav" id="sidebarNav"></nav>
        <div class="sidebar-filters" id="sidebarFilters"></div>
        <div class="sidebar-clearance">
          <div class="clearance-label">CLEARANCE PROGRESS</div>
          <div class="clearance-bar"><div class="clearance-fill"></div></div>
        </div>
      </aside>

      <div id="main-wrap">
        <header id="status-bar">
          <div class="status-bar-left">
            <span class="class-pill class-secret">SECRET</span>
            <span class="class-pill class-subject">SUBJECT</span>
            <span class="status-bar-name"></span>
            <span class="status-bar-location"></span>
          </div>
          <div class="status-bar-right">
            <time id="liveClock" class="status-bar-clock" datetime="">--:--:--</time>
          </div>
        </header>

        <main id="content"></main>

        <footer id="footer"></footer>
      </div>

      <button type="button" id="backToTop" aria-label="Back to top">
        <i class="fas fa-arrow-up"></i>
      </button>
    </div>

    <div class="cursor-ring" id="cursorRing" aria-hidden="true"></div>
    <div class="cursor-dot" id="cursorDot" aria-hidden="true"></div>

    <script src="main.js"></script>
  </body>
</html>
